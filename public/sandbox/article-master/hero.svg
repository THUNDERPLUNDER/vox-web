<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="hx-title hx-desc">
  <title id="hx-title">To personer ved kjøkkenbord i hverdagslys</title>
  <desc id="hx-desc">Dempet, redaksjonelt motiv: samtale i et hjemmelig rom med vinduslys og kaffekopp.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ece8e2"/>
      <stop offset="100%" stop-color="#e0dbd4"/>
    </linearGradient>
    <linearGradient id="winLt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dfe8f0"/>
      <stop offset="55%" stop-color="#f2efe9"/>
      <stop offset="100%" stop-color="#ebe6df"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.95  0 0 0 0 0.93  0 0 0 0 0.9  0 0 0 0.04 0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="overlay"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#wall)"/>
  <rect x="0" y="0" width="520" height="420" fill="url(#winLt)" opacity="0.95"/>
