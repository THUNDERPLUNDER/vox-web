<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" role="img" aria-labelledby="i1-title i1-desc">
  <title id="i1-title">Rolig sone versus støy</title>
  <desc id="i1-desc">Skjematisk: færre lydbølger i rolig sone, flere i støy.</desc>
  <rect width="680" height="360" fill="#faf9f8"/>
  <text x="340" y="36" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" fill="#525a66">Når støyen øker, kreves mer oppmerksomhet for samme samtale</text>
